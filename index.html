<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>K-books</title>
<link rel="icon" href="./favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./assets/98.css?v=2.10">
<link rel="stylesheet" href="./assets/app.css?v=2.10">
<script src="./assets/config.js?v=2.10"></script>
</head>
<body>
<div class="window">
  <div class="title-bar">
    <div class="title-bar-text">K-books</div>
    <div class="title-bar-controls">
      <button aria-label="Minimize"></button>
      <button aria-label="Maximize"></button>
      <button aria-label="Close"></button>
    </div>
  </div>
  <div class="window-body">
    <p>操作を選んでください。</p>
    <div class="menu-buttons">
      <button onclick="location.href='./register.html'">登録</button>
      <button onclick="location.href='./bulk.html'">一括登録</button>
      <button onclick="location.href='./search.html'">検索</button>
      <button onclick="location.href='./settings.html'">設定</button>
    </div>
    <hr>
    <p class="muted" id="status">読み込み中...</p>
    <div id="recent" style="margin-top:8px;"></div>
  </div>
</div>

<script type="module">
  import { fetchData, getPAT } from './assets/core.js?v=2.10';
  const status = document.getElementById('status');
  const recent = document.getElementById('recent');
  const data = await fetchData();
  const n = data.items.length;
  const pat = getPAT() ? '設定済' : '未設定';
  status.textContent = `登録冊数: ${n} 冊  /  PAT: ${pat}  /  バージョン: ${window.APP_CONFIG.version}`;

  // items配列はpush順(=登録順)。末尾5件を取り出して逆順=最新が先頭
  const recentItems = data.items.slice(-5).reverse();
  if (recentItems.length > 0) {
    const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    let html = '<p class="muted">最近の登録 (上位5件)</p>';
    html += '<table border="1"><thead><tr><th>登録日</th><th>シリーズ</th><th>巻</th><th>登録者</th></tr></thead><tbody>';
    for (const it of recentItems) {
      html += `<tr><td>${esc(it.acquiredAt)}</td><td>${esc(it.series)}</td><td>${it.volume ?? ''}</td><td>${esc(it.addedBy || '')}</td></tr>`;
    }
    html += '</tbody></table>';
    recent.innerHTML = html;
  }
</script>
</body>
</html>
