<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>検索 - K-books</title>
<link rel="icon" href="./favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="stylesheet" href="./assets/98.css">
<link rel="stylesheet" href="./assets/app.css">
<script src="./assets/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
</head>
<body>
<div class="window">
  <div class="title-bar">
    <div class="title-bar-text">検索</div>
    <div class="title-bar-controls">
      <button aria-label="Close" onclick="location.href='./index.html'"></button>
    </div>
  </div>
  <div class="window-body">

    <div class="field-row">
      <label>検索語</label>
      <input type="text" id="q" placeholder="シリーズ名・タイトル・著者(かな可)" autofocus>
      <button id="reload" type="button" title="最新の状態を再取得">再読込</button>
    </div>

    <p class="muted" id="status"></p>

    <div id="grouped"></div>

    <hr>

    <div id="detail" style="display:none;">
      <fieldset>
        <legend>編集</legend>
        <div class="field-row"><label>シリーズ名</label><input type="text" id="e_series"></div>
        <div class="field-row"><label>シリーズ読み</label><input type="text" id="e_seriesYomi"></div>
        <div class="field-row"><label>巻数</label><input type="number" id="e_volume"></div>
        <div class="field-row"><label>版</label>
          <select id="e_edition">
            <option value="">通常</option>
            <option value="新装">新装</option>
            <option value="愛蔵">愛蔵</option>
            <option value="完全">完全</option>
            <option value="文庫">文庫</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="field-row"><label>タイトル</label><input type="text" id="e_title"></div>
        <div class="field-row"><label>著者</label><input type="text" id="e_author"></div>
        <div class="field-row"><label>出版社</label><input type="text" id="e_publisher"></div>
        <div class="field-row"><label>ISBN</label><input type="text" id="e_isbn"></div>
        <div class="field-row"><label>表紙URL</label><input type="text" id="e_coverUrl"></div>
        <div class="field-row"><label>メモ</label><textarea id="e_note"></textarea></div>
        <div class="button-row">
          <button id="e_save">保存</button>
          <button id="e_delete">削除</button>
          <button id="e_cancel" type="button">閉じる</button>
        </div>
        <div id="e_status" style="margin-top:8px;"></div>
      </fieldset>
    </div>

    <div class="button-row">
      <button onclick="location.href='./index.html'">トップへ</button>
    </div>

  </div>
</div>

<script type="module" src="./assets/search.js"></script>
</body>
</html>
