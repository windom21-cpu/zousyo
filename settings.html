<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>設定 - K-books</title>
<link rel="icon" href="./favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="stylesheet" href="./assets/98.css">
<link rel="stylesheet" href="./assets/app.css">
<script src="./assets/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
<div class="window">
  <div class="title-bar">
    <div class="title-bar-text">設定</div>
    <div class="title-bar-controls">
      <button aria-label="Close" onclick="location.href='./index.html'"></button>
    </div>
  </div>
  <div class="window-body">

    <fieldset>
      <legend>このリポジトリ</legend>
      <table border="1">
        <tr><th>owner</th><td id="cfgOwner"></td></tr>
        <tr><th>repo</th><td id="cfgRepo"></td></tr>
        <tr><th>branch</th><td id="cfgBranch"></td></tr>
        <tr><th>data file</th><td id="cfgFile"></td></tr>
      </table>
    </fieldset>

    <fieldset style="margin-top:12px;">
      <legend>PAT(Personal Access Token)</legend>
      <p class="muted">この端末から書き込み(登録・編集・削除)を行うために必要です。fine-grained PAT、対象リポのみ、Contents: Read and write を推奨。</p>
      <div class="field-row">
        <label>PAT</label>
        <input type="password" id="pat" placeholder="ghp_xxxxxxxx">
      </div>
      <div class="field-row">
        <label>ニックネーム</label>
        <input type="text" id="nick" placeholder="登録者名(任意)">
      </div>
      <div class="button-row">
        <button id="patSave">保存</button>
        <button id="patClear">クリア</button>
      </div>
      <p id="patStatus" class="muted"></p>
    </fieldset>

    <fieldset style="margin-top:12px;">
      <legend>家族招待用QR</legend>
      <p class="muted">いま端末に保存されているPATを埋め込んだURLをQR化します。家族のスマホで読み取ると、その端末でも書き込み可能になります。<br>
      <span class="warn" style="display:inline-block;">QRはPATそのものと同等の重みです。SNS掲載・来客の見える場所への掲示は避けてください。</span></p>
      <div class="button-row">
        <button id="qrShow">QR表示</button>
        <button id="qrHide">非表示</button>
      </div>
      <div class="qr-area" id="qrArea" style="display:none;">
        <canvas id="qrCanvas"></canvas>
        <p id="qrUrl" class="muted" style="word-break:break-all;"></p>
      </div>
    </fieldset>

    <div class="button-row" style="margin-top:12px;">
      <button onclick="location.href='./index.html'">トップへ</button>
    </div>

  </div>
</div>

<script type="module" src="./assets/settings.js"></script>
</body>
</html>
