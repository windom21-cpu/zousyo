<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>一括登録 - K-books</title>
<link rel="icon" href="./favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./assets/98.css?v=2.18">
<link rel="stylesheet" href="./assets/app.css?v=2.18">
<script src="./assets/config.js?v=2.18"></script>
<script src="https://unpkg.com/html5-qrcode" defer></script>
</head>
<body>
<div class="window">
  <div class="title-bar">
    <div class="title-bar-text">一括登録</div>
    <div class="title-bar-controls">
      <button aria-label="Close" onclick="location.href='./index.html'"></button>
    </div>
  </div>
  <div class="window-body">

    <fieldset>
      <legend>連続スキャン</legend>
      <p class="muted">バーコードを次々に読ませてキューに溜め、最後にまとめて登録します。誤読は「×」で削除可能。</p>
      <div class="button-row">
        <button id="scanStart">スキャン開始</button>
        <button id="scanStop" disabled>停止</button>
      </div>
      <div id="reader" style="margin-top:8px;"></div>
      <div id="scanStatus" class="muted" style="margin-top:6px;"></div>
    </fieldset>

    <fieldset style="margin-top:12px;">
      <legend>スキャン済み (<span id="count">0</span>件)</legend>
      <p class="muted">「編集」で行ごとに修正可。エラー行も足りない情報を補えば登録対象になります。</p>
      <div id="queueWrap"><p class="muted">まだ何もスキャンされていません。</p></div>
      <div class="button-row" style="margin-top:8px;">
        <button id="saveAll" disabled>全件登録</button>
        <button id="clearAll" type="button">全クリア</button>
        <button type="button" onclick="location.href='./index.html'">トップへ</button>
      </div>
      <div id="saveStatus" style="margin-top:8px;"></div>
    </fieldset>

    <fieldset id="editPane" style="display:none; margin-top:12px;">
      <legend>行の編集</legend>
      <div class="field-row"><label>ISBN</label><input type="text" id="ed_isbn"></div>
      <div class="field-row"><label>シリーズ名 *</label>
        <input type="text" id="ed_series" list="bulkSeriesList" autocomplete="off"></div>
      <datalist id="bulkSeriesList"></datalist>
      <div class="field-row"><label>巻数 *</label><input type="number" id="ed_volume" min="0"></div>
      <div class="field-row"><label>版</label>
        <select id="ed_edition">
          <option value="">通常</option>
          <option value="新装">新装</option>
          <option value="愛蔵">愛蔵</option>
          <option value="完全">完全</option>
          <option value="文庫">文庫</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="field-row"><label>タイトル</label><input type="text" id="ed_title"></div>
      <div class="field-row"><label>著者</label><input type="text" id="ed_author"></div>
      <div class="field-row"><label>出版社</label><input type="text" id="ed_publisher"></div>
      <div class="button-row">
        <button id="ed_apply">確定</button>
        <button id="ed_cancel" type="button">閉じる</button>
      </div>
    </fieldset>

  </div>
</div>

<script type="module" src="./assets/bulk.js?v=2.18"></script>
</body>
</html>
