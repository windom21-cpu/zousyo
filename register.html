<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>登録 - K-books</title>
<link rel="icon" href="./favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./assets/98.css?v=2.9">
<link rel="stylesheet" href="./assets/app.css?v=2.9">
<script src="./assets/config.js?v=2.9"></script>
<script src="https://unpkg.com/html5-qrcode" defer></script>
</head>
<body>
<div class="window">
  <div class="title-bar">
    <div class="title-bar-text">登録</div>
    <div class="title-bar-controls">
      <button aria-label="Close" onclick="location.href='./index.html'"></button>
    </div>
  </div>
  <div class="window-body">

    <fieldset>
      <legend>バーコード読取</legend>
      <div class="button-row">
        <button id="scanStart">スキャン開始</button>
        <button id="scanStop" disabled>停止</button>
      </div>
      <div id="reader" style="margin-top:8px;"></div>
      <div id="scanStatus" class="muted" style="margin-top:6px;"></div>
    </fieldset>

    <fieldset style="margin-top:12px;">
      <legend>登録情報</legend>
      <div class="field-row"><label>ISBN</label>
        <input type="text" id="isbn" placeholder="978...">
        <button id="lookup" type="button">openBD取得</button>
      </div>
      <div class="field-row"><label>シリーズ名 *</label><input type="text" id="series" required list="seriesList" autocomplete="off"></div>
      <datalist id="seriesList"></datalist>
      <div class="field-row"><label>シリーズ読み</label><input type="text" id="seriesYomi"></div>
      <div class="field-row"><label>巻数 *</label><input type="number" id="volume" min="0" required></div>
      <div class="field-row"><label>版</label>
        <select id="edition">
          <option value="">通常</option>
          <option value="新装">新装</option>
          <option value="愛蔵">愛蔵</option>
          <option value="完全">完全</option>
          <option value="文庫">文庫</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="field-row"><label>タイトル</label><input type="text" id="title"></div>
      <div class="field-row"><label>著者</label><input type="text" id="author"></div>
      <div class="field-row"><label>出版社</label><input type="text" id="publisher"></div>
      <div class="field-row"><label>表紙URL</label><input type="text" id="coverUrl"></div>
      <div class="field-row"><label>登録者</label><input type="text" id="addedBy" placeholder="ニックネーム"></div>
      <div class="field-row">
        <label>登録日</label>
        <input type="text" id="acquiredAt" placeholder="YYYY-MM-DD" pattern="\d{4}-\d{2}-\d{2}">
        <span class="date-pick-wrap" title="カレンダーから選択">
          <button type="button" tabindex="-1">📅</button>
          <input type="date" id="acquiredAtPicker" aria-label="登録日選択">
        </span>
      </div>
      <div class="field-row"><label>メモ</label><textarea id="note"></textarea></div>

      <div class="button-row">
        <button id="save">登録</button>
        <button id="clear" type="button">クリア</button>
        <button type="button" onclick="location.href='./index.html'">トップへ</button>
      </div>
      <div id="saveStatus" style="margin-top:8px;"></div>
    </fieldset>

  </div>
</div>

<script type="module" src="./assets/register.js?v=2.9"></script>
</body>
</html>
